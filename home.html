<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Page</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f4f4f4;
    }

    /* Navbar */
    nav{
        background:#333;
        padding:15px 50px;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    nav h1{
        color:white;
    }

    nav ul{
        list-style:none;
        display:flex;
        gap:20px;
    }

    nav ul li a{
        color:white;
        text-decoration:none;
        font-size:18px;
    }

    nav ul li a:hover{
        color:orange;
    }

    /* Hero Section */
    .hero{
        height:90vh;
        background:linear-gradient(to right,#4facfe,#00f2fe);
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        color:white;
        text-align:center;
    }

    .hero h2{
        font-size:50px;
        margin-bottom:15px;
    }

    .hero p{
        font-size:20px;
        margin-bottom:20px;
    }

    .btn{
        padding:12px 25px;
        background:white;
        color:#333;
        text-decoration:none;
        border-radius:5px;
        font-weight:bold;
    }

    .btn:hover{
        background:#333;
        color:white;
    }

    /* Footer */
    footer{
        background:#333;
        color:white;
        text-align:center;
        padding:15px;
    }
</style>
</head>
<body>

<nav>
    <h1>My Website</h1>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<section class="hero">
    <h2>Welcome to My Website</h2>
    <p>Create amazing websites with HTML & CSS</p>
    <a href="#" class="btn">Get Started</a>
</section>

<footer>
    <p>&copy; 2026 My Website. All Rights Reserved.</p>
</footer>

</body>
</html>
