<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Luxury Cars</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">

    <!-- Hero -->
    <section class="text-center py-16 px-6">
        <h1 class="text-5xl font-bold text-white">Contact Us</h1>
        <p class="text-slate-400 mt-4 text-lg">
            We are here to help you find your dream luxury car
        </p>
    </section>

    <!-- Contact Section -->
    <section class="max-w-6xl mx-auto px-6 pb-20 grid md:grid-cols-2 gap-10">

        <!-- Contact Info -->
        <div class="bg-[#1a1a1a] p-8 rounded-2xl border border-yellow-400/10">
            <h2 class="text-3xl font-bold text-yellow-400 mb-6">Get In Touch</h2>

            <p class="text-slate-400 mb-4">📍 Surat, Gujarat, India</p>
            <p class="text-slate-400 mb-4">📞 +91 98765 43210</p>
            <p class="text-slate-400 mb-4">📧 codeat_infotech@gmail.com</p>

            <div class="mt-6 text-slate-400">
                <p>Working Hours:</p>
                <p>Mon - Sat: 9:00 AM - 8:00 PM</p>
                <p>Sunday: Closed</p>
            </div>
        </div>

        <!-- Contact Form -->
        <div class="bg-[#1a1a1a] p-8 rounded-2xl border border-yellow-400/10">

            <h2 class="text-3xl font-bold text-yellow-400 mb-6">Send Message</h2>

            <form class="space-y-4">

                <input type="text" placeholder="Your Name"
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-yellow-400 focus:outline-none">

                <input type="email" placeholder="Your Email"
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-yellow-400 focus:outline-none">

                <input type="text" placeholder="Subject"
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-yellow-400 focus:outline-none">

                <textarea rows="5" placeholder="Your Message"
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-yellow-400 focus:outline-none"></textarea>

                <button type="submit"
                    class="w-full bg-yellow-400 text-black font-bold py-3 rounded-xl hover:bg-yellow-300 hover:shadow-[0_0_25px_rgba(250,204,21,0.4)] transition">
                    Send Message
                </button>

            </form>

        </div>

    </section>

    <!-- Footer -->
    <footer class="text-center py-6 bg-[#1a1a1a] border-t border-yellow-400/10 text-slate-400">
        © 2026 Luxury Cars. All Rights Reserved.
    </footer>

</body>

</html>
